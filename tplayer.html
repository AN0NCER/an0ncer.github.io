<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TPlayer</title>
    <link rel="icon" type="image/png" href="/images/player-icon.png">
    <link rel="stylesheet" href="/style/css/tplayer.css">
</head>

<body class="-focus">
    <div class="video-loader">
        <div class="container">
            <div class="meta">
                <div class="episode"></div>
                <div class="voice"></div>
                <div class="q"></div>
            </div>
            <div class="title-wrapper">
                <div class="ru"></div>
                <div class="eng"></div>
            </div>
        </div>
        <div class="wrapper">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="dot"></div>
        </div>
        <div class="bg-img"></div>
    </div>
    <div class="video-wrapper" id="video-wrapper">
        <div class="skip-moment-wrapper -hide">
            <div class="content-value">
                Пропустить
            </div>
            <svg viewBox="0 0 640 640" class="play" aria-hidden="true">
                <use href="#i-angle-right"></use>
            </svg>
        </div>
        <div class="display-points-info-wrapper">
            <div class="circle-wrapper">
                <svg viewBox="0 0 640 640" class="pause" aria-hidden="true">
                    <use href="#i-pause"></use>
                </svg>
                <svg viewBox="0 0 640 640" class="play" aria-hidden="true">
                    <use href="#i-play"></use>
                </svg>
                <svg viewBox="0 0 640 640" class="volume" aria-hidden="true">
                    <use href="#i-volume"></use>
                </svg>
                <svg viewBox="0 0 640 640" class="right" aria-hidden="true">
                    <use href="#i-rotate-right"></use>
                </svg>
                <svg viewBox="0 0 640 640" class="left" aria-hidden="true">
                    <use href="#i-rotate-left"></use>
                </svg>
                <svg viewBox="0 0 640 640" class="speed2x" aria-hidden="true">
                    <use href="#i-angles-right"></use>
                </svg>
                <svg viewBox="0 0 640 640" class="speed1x" aria-hidden="true">
                    <use href="#i-angle-right"></use>
                </svg>
            </div>
        </div>
        <div id="gesture-overlay">
            <div class="zone left" data-zone="left"></div>
            <div class="zone center" data-zone="center"></div>
            <div class="zone right" data-zone="right"></div>
        </div>
        <div class="video-controller">
            <div class="progress-bar-wrapper -hide">
                <div class="video-timeline-controller">
                    <div class="current-time" id="media-progress-bar">
                        <div class="point"></div>
                    </div>
                    <div class="thumbinal -nopreview" id="media-thumbinal-preview">
                        <div class="thumbinal-wrapper">
                            <div class="preview"></div>
                            <div class="timestamp-wrapper">
                                <div class="timestamp" id="media-timestamp-preview">00:00</div>
                            </div>
                        </div>
                    </div>
                    <div class="load-progress" id="media-load-bar"></div>
                </div>
            </div>
            <div class="video-controller-wrapper">
                <div class="l-controlls">
                    <div class="btn w48 h48" id="media-play-button">
                        <svg viewBox="0 0 640 640" class="play" aria-hidden="true">
                            <use href="#i-play"></use>
                        </svg>
                        <svg viewBox="0 0 640 640" class="pause" aria-hidden="true">
                            <use href="#i-pause"></use>
                        </svg>
                    </div>
                    <div class="vtime">
                        <span class="current-time" id="media-current-time">0:0</span>
                        <span class="divider">/</span>
                        <span class="durration" id="media-source-duration">0:0</span>
                    </div>
                </div>
                <div class="r-controlls">
                    <div class="volume-contoller" id="media-volume-container">
                        <div class="tag" data-type="volume-tag">
                            live
                        </div>
                        <div class="volume-slider" id="media-volume-slider" data-type="volume-slider">
                            <div class="value" data-source="volume"></div>
                        </div>
                        <div class="btn w48 h48 v-100" id="media-volume-btn" data-type="volume-btn">
                            <svg viewBox="0 0 640 640" class="v100" aria-hidden="true">
                                <use href="#i-volume"></use>
                            </svg>
                            <svg viewBox="0 0 640 640" class="v50" aria-hidden="true">
                                <use href="#i-volume-low"></use>
                            </svg>
                            <svg viewBox="0 0 640 640" class="v0" aria-hidden="true">
                                <use href="#i-volume-off"></use>
                            </svg>
                            <svg viewBox="0 0 640 640" class="v-mute" aria-hidden="true">
                                <use href="#i-volume-xmark"></use>
                            </svg>
                        </div>
                    </div>
                    <div class="quality-wrapper-btn">
                        <div class="open-quality-selector" id="media-qiality-button" data-source="quality">
                            0p
                        </div>
                    </div>
                    <div class="btn w48 h48 -load" id="media-pip-button">
                        <svg viewBox="0 0 640 640" aria-hidden="true">
                            <use href="#i-picture-in-picture"></use>
                        </svg>
                    </div>
                    <div class="btn w48 h48" id="media-fullscreen-button">
                        <svg viewBox="0 0 640 640" aria-hidden="true">
                            <use href="#i-expand"></use>
                        </svg>
                    </div>
                </div>

                <div class="interactive quality-selector -hide" id="media-quality-interactive">
                    <div class="quality-select-wrapper">
                        <div class="current-quality" data-source="quality">
                            0p
                        </div>
                        <div class="quality-list" id="media-quality-selectors"></div>
                        <div class="btn w48 h48" id="media-close-quality">
                            <svg viewBox="0 0 640 640" aria-hidden="true">
                                <use href="#i-xmark"></use>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="interactive volume-controller -hide" id="media-volume-interactive">
                    <div class="volume-controller-wrapper">
                        <div class="btn w48 h48" id="media-close-volume">
                            <svg viewBox="0 0 640 640" aria-hidden="true">
                                <use href="#i-xmark"></use>
                            </svg>
                        </div>
                        <div class="volume-controller-overlay">
                            <div class="btn w48 h48 v-100" id="media-volume-btn" data-type="volume-btn">
                                <svg viewBox="0 0 640 640" class="v100" aria-hidden="true">
                                    <use href="#i-volume"></use>
                                </svg>
                                <svg viewBox="0 0 640 640" class="v50" aria-hidden="true">
                                    <use href="#i-volume-low"></use>
                                </svg>
                                <svg viewBox="0 0 640 640" class="v0" aria-hidden="true">
                                    <use href="#i-volume-off"></use>
                                </svg>
                                <svg viewBox="0 0 640 640" class="v-mute" aria-hidden="true">
                                    <use href="#i-volume-xmark"></use>
                                </svg>
                            </div>
                            <div class="volume-slider" id="media-volume-slider" data-type="volume-slider">
                                <div class="value" data-source="volume"></div>
                            </div>
                            <div class="tag" data-type="volume-tag">
                                live
                            </div>
                        </div>
                        <div class="presets-list" id="media-presets-volume">
                            <div class="btn w48 h48" data-id="speaker">
                                <svg viewBox="0 0 640 640" aria-hidden="true">
                                    <use href="#i-speaker"></use>
                                </svg>
                            </div>
                            <span class="line"></span>
                            <div class="btn w48 h48" data-id="headphone">
                                <svg viewBox="0 0 640 640" aria-hidden="true">
                                    <use href="#i-headphones"></use>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <video src="" id="player" poster="/images/preview-image.png" playsinline muted></video>
    </div>
